version: '3.8'

services:
  dancemotion-web:
    build:
      context: .
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        ADMIN_EMAIL: ${ADMIN_EMAIL}
        ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://dancemotion.homebasetheisen.me}
    container_name: dancemotion-web
    restart: unless-stopped
    networks:
      - traefik_proxy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dancemotion.rule=Host(`dancemotion.homebasetheisen.me`)"
      - "traefik.http.routers.dancemotion.entrypoints=web"
      - "traefik.http.services.dancemotion.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_proxy"

networks:
  traefik_proxy:
    external: true

