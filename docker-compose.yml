version: '3.8'

services:
  dancemotion-web:
    build:
      context: .
      dockerfile: dockerfile
      args:
        # Note: SUPABASE_SERVICE_ROLE_KEY is NOT passed as build arg - only at runtime via env_file
        # Note: ADMIN_EMAIL/ADMIN_PASSWORD are NOT passed as build args - only at runtime via env_file
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://dancemotion.org}
    container_name: dancemotion-web
    restart: unless-stopped
    networks:
      - traefik_proxy
      - proxy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dancemotion-http.rule=Host(`dancemotion.org`)"
      - "traefik.http.routers.dancemotion-http.entrypoints=web"
      - "traefik.http.routers.dancemotion.rule=Host(`dancemotion.org`)"
      - "traefik.http.routers.dancemotion.entrypoints=web,websecure"
      - "traefik.http.routers.dancemotion.tls=true"
      - "traefik.http.routers.dancemotion.tls.certresolver=cloudflare"
      - "traefik.http.services.dancemotion.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_proxy"

networks:
  traefik_proxy:
    external: true
  proxy:
    external: true

