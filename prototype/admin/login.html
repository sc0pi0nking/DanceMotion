<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — DanceMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_shared.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-wrap {
      width:100%; max-width:400px; margin:0 auto; padding:20px;
    }
    .login-card {
      background:var(--panel); border:1px solid var(--border); border-radius:24px;
      padding:40px; position:relative; overflow:hidden;
    }
    .login-card::before {
      content:''; position:absolute; top:-80px; right:-80px;
      width:240px; height:240px; border-radius:50%;
      background:radial-gradient(circle,rgba(46,196,198,.1),transparent);
      pointer-events:none;
    }
    .login-logo { font-size:22px; font-weight:800; letter-spacing:-.5px; background:linear-gradient(130deg,#2EC4C6,#fff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
    .login-sub  { font-size:13px; color:var(--muted); margin-bottom:32px; }
    .login-form { display:flex; flex-direction:column; gap:14px; }
    .btn-login  { background:var(--accent); color:#000; border:none; padding:14px; border-radius:11px; font-size:15px; font-weight:700; cursor:none; width:100%; transition:transform .2s,box-shadow .2s; }
    .btn-login:hover { transform:translateY(-2px); box-shadow:0 12px 32px rgba(46,196,198,.4); }
    .login-hint { font-size:12px; color:var(--muted); text-align:center; margin-top:8px; }
    .login-back { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:13px; text-decoration:none; margin-bottom:28px; cursor:none; transition:color .2s; }
    .login-back:hover { color:var(--fg); }
    .login-back svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; }
    .error-box { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); border-radius:10px; padding:12px 14px; font-size:13px; color:#f87171; display:none; }
    .error-box.show { display:block; }

    /* rate limit warning for prototype */
    .demo-notice { background:rgba(46,196,198,.08); border:1px solid rgba(46,196,198,.18); border-radius:10px; padding:12px 14px; font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:20px; }
    .demo-notice strong { color:var(--accent); }
  </style>
</head>
<body>
  <div id="cur"></div><div id="cur-ring"></div>

  <div class="login-wrap">
    <a href="../index.html" class="login-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Zur Website
    </a>
    <div class="login-card">
      <div class="login-logo">DanceMotion</div>
      <div class="login-sub">Admin-Bereich · Nur für autorisierte Nutzer</div>

      <div class="demo-notice">
        <strong>Prototyp-Modus:</strong> Beliebige E-Mail + Passwort eingeben um ins Admin-Panel zu gelangen.
      </div>

      <div class="error-box" id="err">E-Mail oder Passwort falsch. (Prototyp: einfach nochmal versuchen)</div>

      <form class="login-form" onsubmit="doLogin(event)">
        <div class="field">
          <label>E-Mail</label>
          <input type="email" id="email" placeholder="admin@dancemotion.org" required />
        </div>
        <div class="field">
          <label>Passwort</label>
          <input type="password" id="pw" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-login mag" id="login-btn">Anmelden</button>
        <p class="login-hint">Passwort vergessen? <a href="#" style="color:var(--accent);cursor:none;">Zurücksetzen</a></p>
      </form>
    </div>
  </div>

  <script>
    let attempts = 0;
    function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Anmelden…';
      btn.disabled = true;
      attempts++;
      setTimeout(() => {
        if (attempts <= 1) {
          // First attempt fails for realism
          document.getElementById('err').classList.add('show');
          btn.textContent = 'Anmelden';
          btn.disabled = false;
        } else {
          // Second attempt succeeds
          btn.textContent = '✓ Angemeldet';
          btn.style.background = 'linear-gradient(135deg,#22c55e,#86efac)';
          setTimeout(() => { window.location.href = 'index.html'; }, 600);
        }
      }, 900);
    }
  </script>
  <script src="../_shared.js"></script>
</body>
</html>
