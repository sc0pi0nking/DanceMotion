<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- DMS (Dance Music School) Main Brand Logo -->
  <defs>
    <linearGradient id="dmsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2EC4C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a9496;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stylized DM mark: circular flow -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#dmsGrad)" stroke-width="2" opacity="0.4"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#dmsGrad)" stroke-width="2" opacity="0.6"/>
  
  <!-- Center mark -->
  <circle cx="100" cy="100" r="12" fill="#2EC4C6" opacity="0.8"/>
  
  <!-- Accent spikes -->
  <line x1="100" y1="30" x2="100" y2="45" stroke="#2EC4C6" stroke-width="2.5"/>
  <line x1="100" y1="155" x2="100" y2="170" stroke="#2EC4C6" stroke-width="2.5"/>
  <line x1="30" y1="100" x2="45" y2="100" stroke="#2EC4C6" stroke-width="2.5"/>
  <line x1="155" y1="100" x2="170" y2="100" stroke="#2EC4C6" stroke-width="2.5"/>
  
  <!-- TEXT: DM -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#2EC4C6">DM</text>
</svg>
