<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-base { font-family: Arial, sans-serif; font-weight: bold; fill: #FFF; }
    </style>
  </defs>
  
  <!-- Diamond background -->
  <rect x="50" y="50" width="100" height="100" fill="#2EC4C6" transform="rotate(45 100 100)"/>
  <rect x="55" y="55" width="90" height="90" fill="#000" transform="rotate(45 100 100)"/>
  
  <!-- Sunburst rays -->
  <g stroke="#2EC4C6" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="30" x2="100" y2="50"/>
    <line x1="130" y1="40" x2="145" y2="55"/>
    <line x1="150" y1="70" x2="160" y2="80"/>
    <line x1="70" y1="40" x2="55" y2="55"/>
    <line x1="50" y1="70" x2="40" y2="80"/>
  </g>
  
  <!-- Stars -->
  <circle cx="75" cy="85" r="2" fill="#FFF"/>
  <circle cx="125" cy="85" r="2" fill="#FFF"/>
  <circle cx="100" cy="65" r="2" fill="#FFF"/>
  
  <!-- Text -->
  <text x="100" y="105" text-anchor="middle" class="text-base" font-size="16">LITTLE JOYS</text>
  <text x="100" y="125" text-anchor="middle" class="text-base" font-size="8">SHOWTANZE GRUPPE</text>
</svg>