<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-base { font-family: Arial, sans-serif; font-weight: bold; }
      .accent { fill: #2EC4C6; }
      .dark { fill: #000; }
    </style>
  </defs>
  
  <!-- Triangle/Arrow pointing right -->
  <path class="dark" d="M 50 70 L 120 50 L 140 100 L 120 150 L 50 130 Z"/>
  
  <!-- Accent stripes -->
  <line x1="70" y1="80" x2="80" y2="75" stroke="#2EC4C6" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="95" x2="90" y2="88" stroke="#2EC4C6" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="110" x2="90" y2="115" stroke="#2EC4C6" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Accent triangle accent on right -->
  <path class="accent" d="M 125 80 L 150 100 L 125 120 Z"/>
  
  <!-- Text -->
  <text x="75" y="110" class="text-base accent" font-size="18">EMOTION</text>
  <text x="75" y="135" class="text-base accent" font-size="9">SHOWTANZGRUPPE</text>
</svg>