<svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-base { font-family: Arial, sans-serif; font-weight: bold; }
      .accent { fill: #2EC4C6; }
      .dark { fill: #000; }
      .white { fill: #FFF; }
    </style>
  </defs>
  
  <!-- Shield left side -->
  <path class="dark" d="M 40 20 L 80 40 L 80 90 Q 60 120 60 120 Q 40 90 40 40 Z"/>
  <path class="accent" d="M 45 25 L 75 42 L 75 85 Q 60 110 60 110 Q 48 85 48 42 Z"/>
  
  <!-- Sunburst -->
  <g class="white" stroke-width="2" stroke-linecap="round">
    <line x1="60" y1="35" x2="60" y2="20"/>
    <line x1="72" y1="45" x2="82" y2="35"/>
    <line x1="78" y1="60" x2="92" y2="60"/>
  </g>
  
  <!-- Main text -->
  <text x="150" y="60" class="text-base accent" font-size="32">DANCEMOTION</text>
  
  <!-- Subtext -->
  <text x="150" y="85" class="text-base white" font-size="14">EVENT-STUDIO</text>
  
  <!-- Accent bars -->
  <rect x="140" y="95" width="80" height="2" class="accent"/>
  <rect x="140" y="102" width="60" height="2" class="accent"/>
</svg>