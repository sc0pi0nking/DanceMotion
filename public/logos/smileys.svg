<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-base { font-family: Arial, sans-serif; font-weight: bold; }
      .accent { fill: #2EC4C6; }
      .dark { fill: #000; }
      .white { fill: #FFF; }
    </style>
  </defs>
  
  <!-- Diamond background -->
  <path class="accent" d="M 100 30 L 150 80 L 100 130 L 50 80 Z"/>
  <path class="dark" d="M 100 40 L 140 80 L 100 120 L 60 80 Z"/>
  
  <!-- Sunburst rays -->
  <g class="accent" stroke-width="2">
    <line x1="100" y1="40" x2="100" y2="20"/>
    <line x1="120" y1="50" x2="135" y2="35"/>
    <line x1="135" y1="75" x2="155" y2="75"/>
    <line x1="120" y1="100" x2="135" y2="125"/>
    <line x1="80" y1="110" x2="75" y2="130"/>
    <line x1="60" y1="85" x2="40" y2="95"/>
    <line x1="75" y1="50" x2="60" y2="35"/>
  </g>
  
  <!-- Smiley face -->
  <circle cx="100" cy="75" r="12" class="accent" fill="none" stroke-width="1.5"/>
  <circle cx="96" cy="72" r="1.5" class="accent"/>
  <circle cx="104" cy="72" r="1.5" class="accent"/>
  <path d="M 96 77 Q 100 80 104 77" stroke="#2EC4C6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="100" y="100" text-anchor="middle" class="text-base white" font-size="14">SMILEYS</text>
  <text x="100" y="118" text-anchor="middle" class="text-base white" font-size="8">SHOWTANZGRUPPE</text>
</svg>