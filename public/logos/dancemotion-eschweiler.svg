<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: Arial, sans-serif; font-weight: bold; }
      .logo-accent { fill: #2EC4C6; }
      .logo-dark { fill: #000; }
      .logo-white { fill: #FFF; }
    </style>
  </defs>
  
  <!-- Shield background -->
  <path class="logo-accent" d="M 100 20 L 130 40 L 130 100 Q 100 150 100 150 Q 70 100 70 40 Z"/>
  
  <!-- Dancer silhouette -->
  <g class="logo-white" transform="translate(100, 70)">
    <!-- Head -->
    <circle cx="0" cy="-15" r="4"/>
    <!-- Body -->
    <line x1="0" y1="-11" x2="0" y2="5" stroke="white" stroke-width="2"/>
    <!-- Arms -->
    <line x1="0" y1="-8" x2="-8" y2="-12" stroke="white" stroke-width="2"/>
    <line x1="0" y1="-8" x2="8" y2="-5" stroke="white" stroke-width="2"/>
    <!-- Legs -->
    <line x1="0" y1="5" x2="-6" y2="15" stroke="white" stroke-width="2"/>
    <line x1="0" y1="5" x2="6" y2="15" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="160" text-anchor="middle" class="logo-text logo-white" font-size="14">
    DANCEMOTION
  </text>
  <text x="100" y="175" text-anchor="middle" class="logo-text logo-white" font-size="10">
    ESCHWEILER
  </text>
</svg>